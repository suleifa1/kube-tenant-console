{{- if .Values.serviceAccount.clusterAdmin -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-tenant-console.fullname" . }}-cluster-admin
  labels:
    {{- include "kube-tenant-console.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-tenant-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
{{- end }}
